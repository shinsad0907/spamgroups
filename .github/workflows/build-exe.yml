name: Build Standalone EXE

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller build.spec
    
    - name: Create release folder structure
      run: |
        mkdir release
        xcopy /E /I dist\spamgroup release\spamgroup
        echo. > release\README.txt
        echo Spamgroup Tool - Professional Edition >> release\README.txt
        echo. >> release\README.txt
        echo Run: spamgroup\spamgroup.exe >> release\README.txt
    
    - name: Compress release
      run: |
        cd release
        powershell -Command "Compress-Archive -Path spamgroup -DestinationPath spamgroup.zip"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: spamgroup-exe
        path: release/spamgroup/
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Spamgroup ${{ github.ref_name }}
        body: |
          ## Spamgroup Standalone EXE
          
          Professional standalone executable built from source.
          
          **How to use:**
          1. Extract the `spamgroup` folder
          2. Run `spamgroup/spamgroup.exe`
          
          No Python installation required.
        draft: false
        prerelease: false
    
    - name: Upload Release Asset (ZIP)
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/spamgroup.zip
        asset_name: spamgroup-${{ github.ref_name }}.zip
        asset_content_type: application/zip
